name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Optional stable release version, for example v1.0.1'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Dot[9] Windows app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.203'

      - name: Restore
        run: dotnet restore .\Dot9.sln

      - name: Restore Windows publish runtime
        run: dotnet restore .\src\Dot9\Dot9.csproj -r win-x64

      - name: Build
        run: dotnet build .\Dot9.sln -c Release --no-restore

      - name: Publish clickable Windows build
        run: dotnet publish .\src\Dot9\Dot9.csproj -c Release -r win-x64 --self-contained true --no-restore -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o .\artifacts\Dot9-win-x64

      - name: Package release ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path .\artifacts\Dot9-win-x64\* -DestinationPath .\artifacts\Dot9-win-x64.zip -Force
          Get-ChildItem .\artifacts

      - name: Upload Dot[9] Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dot9-win-x64
          path: .\artifacts\Dot9-win-x64.zip
          if-no-files-found: error

      - name: Publish rolling latest GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = 'latest'
          $notes = @'
          Dot[9] latest Windows build.

          Download Dot9-win-x64.zip, extract it, and run Dot9.exe.

          This rolling release is updated whenever main is updated. Use versioned releases such as v1.0.0 or v1.0.1 for stable snapshots.

          Dot[9] is a comfort tool, not a medical treatment.
          '@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes --cleanup-tag
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f $tag
          git push origin $tag --force

          gh release create $tag .\artifacts\Dot9-win-x64.zip --title 'Dot[9] latest Windows build' --notes $notes --latest

      - name: Publish immutable versioned GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_version != '')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF_NAME } else { '${{ inputs.release_version }}' }
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release version must look like v1.0.1. Received: $tag"
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            throw "Release $tag already exists. Versioned releases are immutable; create a new version instead."
          }

          $notes = @"
          Dot[9] $tag for Windows.

          Download Dot9-win-x64.zip, extract it, and run Dot9.exe.

          This is a stable snapshot. The rolling latest release may contain newer changes.

          Dot[9] is a comfort tool, not a medical treatment.
          "@

          gh release create $tag .\artifacts\Dot9-win-x64.zip --title "Dot[9] $tag" --notes $notes
