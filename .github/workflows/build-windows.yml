name: Build Windows EXE

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Dot[9] Windows app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.203'

      - name: Create CI NuGet config
        shell: pwsh
        run: |
          @'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            </packageSources>
          </configuration>
          '@ | Set-Content -Path NuGet.CI.Config -Encoding UTF8

      - name: Restore
        run: dotnet restore .\Dot9.sln --configfile .\NuGet.CI.Config

      - name: Build
        run: dotnet build .\Dot9.sln -c Release --no-restore

      - name: Publish clickable Windows build
        run: dotnet publish .\src\Dot9\Dot9.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o .\artifacts\Dot9-win-x64 --configfile .\NuGet.CI.Config

      - name: Package release ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path .\artifacts\Dot9-win-x64\* -DestinationPath .\artifacts\Dot9-win-x64.zip -Force
          Get-ChildItem .\artifacts

      - name: Upload Dot[9] Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dot9-win-x64
          path: .\artifacts\Dot9-win-x64.zip
          if-no-files-found: error

      - name: Publish latest GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = 'v1.0.0'
          $notes = @'
          Dot[9] 1.0.0 for Windows.

          Download Dot9-win-x64.zip, extract it, and run Dot9.exe.

          Dot[9] is a comfort tool, not a medical treatment.
          '@

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes --cleanup-tag
          }

          gh release view 'v0.1.0-mvp' *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete 'v0.1.0-mvp' --yes --cleanup-tag
          }

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f $tag
          git push origin $tag --force

          gh release create $tag .\artifacts\Dot9-win-x64.zip --title 'Dot[9] 1.0.0' --notes $notes --latest
